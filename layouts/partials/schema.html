<!-- CreativeWork Schema -->
{{ if .IsPage }}
    {{ if eq .Type "post" }}
        <script type="application/ld+json">
        {
            "@context": "https://schema.org",
            "@type": "CreativeWork",
            "headline": "{{ .Title | safeJS }}",
            "description": "{{ if .Description }}{{ .Description | safeJS }}{{ else }}{{ .Summary | safeJS }}{{ end }}",
            "datePublished": "{{ .Date.Format "2006-01-02" }}",
            "dateModified": "{{ .Lastmod.Format "2006-01-02" }}",
            "author": {
                "@type": "Person",
                "name": "{{ .Params.author }}"
            },
            "publisher": {
                "@type": "Organization",
                "name": "{{ .Site.Params.organization }}",
                "logo": {
                    "@type": "ImageObject",
                    "url": "{{ .Site.Params.logo | absURL }}"
                }
            },
            "mainEntityOfPage": {
                "@type": "WebPage",
                "@id": "{{ .Permalink }}"
            },
            "image": "{{ if .Params.image }}{{ .Params.image | absURL }}{{ else }}{{ .Site.Params.defaultPostImage | absURL }}{{ end }}",
            "keywords": [
                "{{ range $i, $e := .Params.tags }}{{ if $i }}, {{ end }}{{ $e }}{{ end }}"
            ]
        }
        </script>
    {{ end }}
{{ end }}

<!-- Organization Schema -->
<script type="application/ld+json">
{
    "@context": "https://schema.org",
    "@type": "Organization",
    "name": "{{ .Site.Params.organization }}",
    "url": "{{ .Site.BaseURL }}",
    "logo": "{{ .Site.Params.logo | absURL }}",
    "telephone": "{{ .Site.Params.telephone }}",
    "email": "{{ .Site.Params.email }}",
    "address": {
        "@type": "PostalAddress",
        "streetAddress": "{{ .Site.Params.address }}",
        "addressLocality": "{{ .Site.Params.addressLocality }}",
        "addressRegion": "{{ .Site.Params.addressRegion }}",
        "postalCode": "{{ .Site.Params.postalCode }}",
        "addressCountry": "{{ .Site.Params.country }}"
    }
}
</script>
